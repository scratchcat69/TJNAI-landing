<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Confirm your DipCue account</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0A0F1C;
      color: #E8EBF0;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    h1 { color: #00D4E8; font-size: 32px; margin: 0 0 8px; letter-spacing: -0.5px; }
    p { color: #A0A8BC; max-width: 360px; line-height: 1.5; margin: 8px 0 0; }
    a.btn {
      display: inline-block;
      margin-top: 24px;
      background: #00D4E8;
      color: #000;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
    }
    a.appstore { display: block; margin-top: 16px; color: #A0A8BC; font-size: 14px; text-decoration: none; }
    a.appstore:hover { color: #E8EBF0; }
  </style>
</head>
<body>
  <h1>DipCue</h1>
  <p>Your account is confirmed. Tap below to open the app.</p>
  <a class="btn" id="open" href="#">Open DipCue</a>
  <script>
    var params = new URLSearchParams(window.location.search);
    var code = params.get('code');
    var btn = document.getElementById('open');
    if (code) {
      btn.href = 'dipcue://auth/confirm?code=' + encodeURIComponent(code);
    } else {
      btn.style.display = 'none';
    }
  </script>
</body>
</html>
