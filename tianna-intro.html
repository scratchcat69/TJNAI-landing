<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet Tianna — TJNAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:"Space Grotesk",sans-serif}
#mx-canvas{position:fixed;inset:0;z-index:1;display:block;width:100%;height:100%}
#tianna-src{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}
.scanline{position:fixed;inset:0;z-index:3;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.04) 0px,rgba(0,0,0,0.04) 1px,transparent 1px,transparent 2px)}
.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 35%,rgba(0,0,0,0.75) 100%)}
.top-logo{position:fixed;top:24px;left:36px;z-index:10;display:flex;align-items:center;gap:10px;
  opacity:0;transition:opacity 1s ease}
.top-logo.show{opacity:1}
.top-logo img{width:32px;height:32px;border-radius:50%}
.top-logo span{font-weight:700;font-size:16px;letter-spacing:0.08em;color:rgba(255,255,255,0.8)}
.skip-btn{position:fixed;top:24px;right:36px;z-index:10;padding:8px 20px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  border-radius:999px;color:rgba(255,255,255,0.4);font-size:12px;font-weight:500;
  cursor:pointer;transition:all 0.2s;letter-spacing:0.06em;font-family:inherit}
.skip-btn:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7)}
.overlay{position:fixed;inset:0;z-index:4;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;padding-bottom:72px;pointer-events:none}
.info-block{text-align:center;pointer-events:all;opacity:0;transform:translateY(20px);
  transition:opacity 0.8s ease,transform 0.8s ease}
.info-block.show{opacity:1;transform:translateY(0)}
.title-line{font-size:clamp(52px,9vw,108px);font-weight:700;letter-spacing:0.18em;color:#fff;
  text-shadow:0 0 40px rgba(0,212,255,0.5),0 0 80px rgba(0,212,255,0.2);
  line-height:1;margin-bottom:10px;min-height:1.2em}
.title-cursor{display:inline-block;width:3px;height:0.8em;background:#00d4ff;margin-left:6px;
  animation:blink 0.7s step-end infinite;vertical-align:baseline;
  box-shadow:0 0 10px #00d4ff}
.title-cursor.done{display:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.subtitle{font-size:12px;letter-spacing:0.28em;color:rgba(0,212,255,0.65);
  text-transform:uppercase;margin-bottom:36px;
  opacity:0;transition:opacity 0.8s ease 0.3s}
.subtitle.show{opacity:1}
.cta-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;
  opacity:0;transform:translateY(10px);transition:opacity 0.7s ease,transform 0.7s ease}
.cta-wrap.show{opacity:1;transform:translateY(0)}
.enter-btn{display:inline-flex;align-items:center;gap:12px;padding:16px 44px;
  background:linear-gradient(135deg,#00d4ff,#8b5cf6);color:#fff;
  font-family:inherit;font-size:16px;font-weight:700;letter-spacing:0.06em;
  border:none;border-radius:999px;cursor:pointer;
  box-shadow:0 8px 40px rgba(0,212,255,0.4),0 0 80px rgba(0,212,255,0.15);
  transition:transform 0.2s,box-shadow 0.2s;
  animation:glow-pulse 2.5s ease-in-out infinite}
@keyframes glow-pulse{
  0%,100%{box-shadow:0 8px 40px rgba(0,212,255,0.4),0 0 80px rgba(0,212,255,0.15)}
  50%{box-shadow:0 8px 60px rgba(0,212,255,0.6),0 0 120px rgba(0,212,255,0.3)}}
.enter-btn:hover{transform:translateY(-3px);box-shadow:0 12px 50px rgba(0,212,255,0.55)}
.enter-btn svg{transition:transform 0.2s}
.enter-btn:hover svg{transform:translateX(4px)}
.auto-note{font-size:11px;color:rgba(255,255,255,0.22);letter-spacing:0.1em}
.progress-bar{width:180px;height:1px;background:rgba(255,255,255,0.08);
  border-radius:999px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;background:linear-gradient(to right,#00d4ff,#8b5cf6);
  width:0%;border-radius:999px;transition:width 1s linear}
</style>
</head>

<script>
(function(){
  var GALLERY = 'tianna-gallery-v4.html';
  var CW = 11, CH = 18;
  var DENSE  = '@#MWQBND8$&';
  var MEDS   = 'oabc+=?03';
  var LIGHTS = '-;:,.';
  var MCHARS = 'アイウエオカキクケコサシスセソタチ01TJNAI$%#@';

  var canvas = document.getElementById('mx-canvas');
  var ctx = canvas.getContext('2d');
  var W=0, H=0, COLS=0, ROWS=0;
  var drops=[], locked=new Map();
  var pixData=null, imgW=400, imgH=600;
  var startTime=null;
  var titleDone=false, ctaDone=false;
  var autoTimer=null;

  // Timing constants
  var T_RAIN=1.8, T_FORM_END=5.2, T_COLOR_END=7.0, T_TITLE=6.0, T_CTA=8.2;

  function resize(){
    W = canvas.width  = window.innerWidth  || 1440;
    H = canvas.height = window.innerHeight || 900;
    COLS = Math.ceil(W/CW);
    ROWS = Math.ceil(H/CH);
    drops = makeDrps();
    locked.clear();
  }

  function makeDrps(){
    var a=[];
    for(var i=0;i<COLS;i++) a.push({
      y: Math.random()*-ROWS,
      spd: 0.25+Math.random()*0.35,
      trail: 12+Math.floor(Math.random()*10),
      buf: Array.from({length:200},()=>rch())
    });
    return a;
  }

  function rch(){ return MCHARS[Math.floor(Math.random()*MCHARS.length)]; }

  function bChar(b){
    if(b>0.85) return DENSE[Math.floor(Math.random()*DENSE.length)];
    if(b>0.60) return MEDS[Math.floor(Math.random()*MEDS.length)];
    if(b>0.25) return LIGHTS[Math.floor(Math.random()*LIGHTS.length)];
    return ' ';
  }

  function getPx(col,row){
    if(!pixData) return {r:0,g:0,b:0,bri:0};
    var px=Math.floor((col/COLS)*imgW);
    var py=Math.floor((row/ROWS)*imgH);
    var i=(py*imgW+px)*4;
    var r=pixData[i],g=pixData[i+1],b=pixData[i+2];
    return {r:r,g:g,b:b,bri:(r+g+b)/(3*255)};
  }

  // Load image data
  var src=document.getElementById('tianna-src');
  function loadPx(){
    var tmp=document.createElement('canvas');
    tmp.width=imgW; tmp.height=imgH;
    var tc=tmp.getContext('2d');
    tc.drawImage(src,0,0,imgW,imgH);
    pixData=tc.getImageData(0,0,imgW,imgH).data;
  }
  if(src.complete && src.naturalHeight>0) loadPx();
  else src.addEventListener('load',loadPx);

  function render(ts){
    if(!startTime) startTime=ts;
    var t=(ts-startTime)/1000;
    ctx.font = CH+'px monospace';

    // Background fade
    ctx.fillStyle='rgba(0,0,0,0.07)';
    ctx.fillRect(0,0,W,H);

    // Rain alpha fades out after form ends
    var rainA = t<T_FORM_END ? 1.0 : Math.max(0,1-(t-T_FORM_END)/1.5);

    // Draw rain drops
    if(rainA>0.01){
      drops.forEach(function(d,col){
        d.buf[Math.floor(d.y)%d.buf.length]=rch();
        var head=Math.floor(d.y);
        for(var i=0;i<d.trail;i++){
          var row=head-i;
          if(row<0||row>=ROWS) continue;
          var key=col+','+row;
          if(locked.has(key)) continue;
          var ch=d.buf[(row+200)%d.buf.length];
          var alpha=(1-i/d.trail)*rainA*0.85;
          if(i===0) ctx.fillStyle='rgba(180,255,190,'+alpha+')';
          else if(i<3) ctx.fillStyle='rgba(0,255,65,'+alpha+')';
          else ctx.fillStyle='rgba(0,180,40,'+(alpha*0.55)+')';
          ctx.fillText(ch,col*CW,(row+1)*CH);
        }
        d.y+=d.spd;
        if(d.y>ROWS+5){ d.y=-3-Math.random()*10; d.spd=0.25+Math.random()*0.35; }

        // Lock cells as drop passes during form phase
        if(t>=T_RAIN && t<T_FORM_END && pixData){
          var lockRow=head;
          if(lockRow>=0&&lockRow<ROWS){
            var k2=col+','+lockRow;
            if(!locked.has(k2)){
              var p=getPx(col,lockRow);
              if(p.bri>0.07){
                locked.set(k2,{ch:bChar(p.bri),r:p.r,g:p.g,b:p.b,bri:p.bri});
              }
            }
          }
        }
      });
    }

    // Draw locked image cells
    if(locked.size>0){
      var cp=t<T_FORM_END?0:Math.min((t-T_FORM_END)/(T_COLOR_END-T_FORM_END),1);
      locked.forEach(function(cell,key){
        var parts=key.split(',');
        var col=+parts[0], row=+parts[1];
        var gr=Math.round(cell.r*cp);
        var gg=Math.round(255*(1-cp)+cell.g*cp);
        var gb=Math.round(65*(1-cp)+cell.b*cp);
        var a=Math.min(0.45+cell.bri*0.55,1);
        ctx.fillStyle='rgba('+gr+','+gg+','+gb+','+a+')';
        ctx.fillText(cell.ch,col*CW,(row+1)*CH);
      });
    }

    // Trigger title
    if(t>=T_TITLE && !titleDone){
      titleDone=true;
      document.getElementById('top-logo').classList.add('show');
      document.getElementById('info-block').classList.add('show');
      typeTitle();
    }
    if(t>=T_CTA && !ctaDone){
      ctaDone=true;
      document.getElementById('subtitle').classList.add('show');
      setTimeout(function(){
        document.getElementById('cta-wrap').classList.add('show');
        startCountdown();
      },700);
    }

    requestAnimationFrame(render);
  }

  function typeTitle(){
    var T='TIANNA';
    var el=document.getElementById('title-text');
    var cur=document.getElementById('cursor');
    var i=0;
    function next(){
      if(i<=T.length){
        el.textContent=T.slice(0,i); i++;
        setTimeout(next, i<=T.length?115:500);
      } else { cur.classList.add('done'); }
    }
    next();
  }

  function startCountdown(){
    var c=5;
    var cdEl=document.getElementById('cd');
    var pfEl=document.getElementById('pf');
    pfEl.style.width='0%';
    autoTimer=setInterval(function(){
      c--;
      cdEl.textContent=c;
      pfEl.style.width=((5-c)/5*100)+'%';
      if(c<=0){ clearInterval(autoTimer); goGallery(); }
    },1000);
  }

  window.goGallery=function(){
    if(autoTimer) clearInterval(autoTimer);
    document.querySelector('.overlay').style.transition='opacity 0.5s';
    document.querySelector('.overlay').style.opacity='0';
    setTimeout(function(){ window.location.href=GALLERY; },500);
  };

  // Init
  resize();
  window.addEventListener('resize',resize);
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
